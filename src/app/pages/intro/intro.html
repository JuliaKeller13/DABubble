<main class="intro" [class.intro--sliding]="isSliding()">
  <div class="intro__background-overlay" [class.intro__background-overlay--fade]="backgroundFaded()"></div>
  
  <div class="intro__container">
    <div class="intro__logo-wrapper">
      <div class="intro__logo-icon-box">
        <img src="img/logo/Logo.svg" alt="DABubble Logo" class="intro__logo-img">
      </div>
      <div class="intro__logo-text-box">
        <h1 class="intro__logo-text text-intro">DABubble</h1>
      </div>
    </div>
  </div>
</main>
