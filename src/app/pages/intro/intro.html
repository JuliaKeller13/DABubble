<main class="intro" [class.intro--sliding]="isSliding()">
  <div class="intro__background-overlay" [class.intro__background-overlay--fade]="backgroundFaded()"></div>
  
  <div class="intro__container">
    <div class="intro__logo-wrapper">
      <img src="img/logo/logo_with_text.svg" alt="DABubble Logo" class="intro__logo intro__logo--black">
      <img src="img/logo/logo_with_text_white.svg" alt="DABubble Logo" class="intro__logo intro__logo--white">
    </div>
  </div>
</main>
